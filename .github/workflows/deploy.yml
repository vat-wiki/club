name: Deploy & Publish

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: self-hosted
    defaults:
      run:
        working-directory: /home/leon/projects/club
    steps:
      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Pull latest
        run: |
          git fetch origin main
          git reset --hard origin/main

      - name: Build & deploy (test)
        run: ./scripts/deploy.sh build

  publish-cli:
    runs-on: self-hosted
    permissions:
      id-token: write
    needs: deploy
    defaults:
      run:
        working-directory: /home/leon/projects/club
    steps:
      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Pull latest
        run: |
          git fetch origin main
          git reset --hard origin/main

      - name: Install & build
        run: |
          npm ci
          cd packages/cli && npm run build

      - name: Publish to npm
        if: always() && needs.deploy.result == 'success'
        run: |
          LOCAL_VERSION=$(node -p "require('./packages/cli/package.json').version")
          REMOTE_VERSION=$(npm view club-cli version 2>/dev/null || echo "0.0.0")
          if [ "$LOCAL_VERSION" = "$REMOTE_VERSION" ]; then
            echo "⚠ Version $LOCAL_VERSION already published, skipping"
            exit 0
          fi
          echo "✓ Publishing version $LOCAL_VERSION"
          cd packages/cli
          npm publish --provenance --access public
